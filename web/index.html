<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO & description -->
  <title>PolyBag – Zdravé sezení</title>
  <meta name="description" content="Tipy na správné sezení, kompenzační cvičení a produkty PolyBag z recyklovaných bigbagů.">
  <meta name="author" content="PolyBag">

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PolyBag">
  <meta name="theme-color" content="#40CDBB">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Splash screen background while Flutter loads -->
  <style>
    body {
      margin: 0;
      background-color: #40CDBB;
    }
    #loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    #loading img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.7; transform: scale(0.93); }
    }
  </style>
</head>
<body>
  <!-- Shown while Flutter initialises -->
  <div id="loading">
    <img src="icons/Icon-192.png" alt="PolyBag">
  </div>

  <script>
    // Force service worker to update immediately when a new version is deployed
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let reg of registrations) {
          reg.update();
        }
      });
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        window.location.reload();
      });
    }

    window.addEventListener('flutter-first-frame', function () {
      var loading = document.getElementById('loading');
      if (loading) loading.remove();
    });
  </script>

  <!-- v0.1.0 — bump this version string on every deploy to bust the cache -->
  <script src="flutter_bootstrap.js?v=0.1.0" async></script>
</body>
</html>
